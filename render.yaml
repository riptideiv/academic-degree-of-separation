services:
  - type: web
    name: researchers-degree-of-separation
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENALEX_KEY
        sync: false
      - key: OPENALEX_MAILTO
        sync: false
      - key: SUPABASE_POOLER_CONNECTION_STRING
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: GOOGLE_CLOUD_PROJECT
        sync: false
